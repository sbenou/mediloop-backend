# Backend test suite + optional Phase 3 clinical integration tests (Neon).
#
# Configure repo secret TEST_DATABASE_URL for a CI-safe Postgres branch that can
# receive migrations 018–023. If unset, Phase 3 job is skipped.

name: Backend CI

on:
  push:
    branches: [main, develop]
    paths:
      - "backend/**"
      - "tests/backend/**"
      - "tests/utils/**"
      - "src/services/clinicalApi.ts"
      - "src/components/teleconsultation/**"
      - ".github/workflows/backend-ci.yml"
  pull_request:
    branches: [main, develop]
    paths:
      - "backend/**"
      - "tests/backend/**"
      - "tests/utils/**"
      - "src/services/clinicalApi.ts"
      - "src/components/teleconsultation/**"
      - ".github/workflows/backend-ci.yml"

jobs:
  test-backend:
    runs-on: ubuntu-latest
    env:
      SKIP_AUTH_RESEND_ROUTES: "1"
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: denoland/setup-deno@v2
        with:
          deno-version: v1.x

      - name: Verify Deno entrypoints (module graph)
        run: deno task verify-deno-entrypoints

      - name: Run backend tests
        run: deno task test-backend

  test-backend-phase3-clinical:
    needs: test-backend
    runs-on: ubuntu-latest
    if: ${{ secrets.TEST_DATABASE_URL != '' }}
    defaults:
      run:
        working-directory: backend
    env:
      TEST_DATABASE_URL: ${{ secrets.TEST_DATABASE_URL }}
      RUN_PHASE3_CLINICAL_TESTS: "1"
      SKIP_AUTH_RESEND_ROUTES: "1"
    steps:
      - uses: actions/checkout@v4

      - uses: denoland/setup-deno@v2
        with:
          deno-version: v1.x

      - name: Install PostgreSQL client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: Apply clinical migrations (018 → 023)
        run: deno task apply-clinical-option-c-migrations

      - name: Phase 3 clinical tests
        run: deno task test-backend-phase3
